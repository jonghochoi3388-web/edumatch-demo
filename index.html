function parseCSV(text){
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  var rows=[],field="",row=[],inq=false,i=0;
  while(i<text.length){var c=text[i];
    if(inq){if(c=='"'){if(text[i+1]=='"'){field+='"';i++;}else inq=false;}else field+=c;}
    else{if(c=='"')inq=true;else if(c==','){row.push(field);field="";}else if(c=='\n'){row.push(field);rows.push(row);row=[];field="";}else if(c=='\r'){}else field+=c;}

    for(var k=0;k<order.length;k++){var f=order[k],d=0,ix=iid(x),iy=iid(y);
      if(f==="신청시각")d=new Date(x.신청시각||0)-new Date(y.신청시각||0);
      else if(f==="거주지"){var rx=reg[ix]===courseRegion?0:1,ry=reg[iy]===courseRegion?0:1;d=rx-ry;}
      else if(f==="수행성실도")d=(dil[iy]||0)-(dil[ix]||0);
      else if(f==="수강생평점")d=(rate[iy]||0)-(rate[ix]||0);
      else if(f==="우선순위")d=(x.우선순위||3)-(y.우선순위||3);
      else if(f==="점수")d=(score[iy]||0)-(score[ix]||0);
      if(d)return d;
    }
    return 0;
  };
}
function runAuto(month){
  var matches=DB.matches.filter(function(m){return !(m.month===month&&m.method==="자동");});
  var load={};matches.filter(function(m){return m.month===month;}).forEach(function(m){load[m.instructorId]=tryAdd(load[m.instructorId]||{},courseWeeks(m.openCourseId))||load[m.instructorId]||{};});
  var apps=DB.instrApplications.filter(function(a){return a.month===month&&a.상태==="접수";});
  var byC={};apps.forEach(function(a){(byC[a.openCourseId]=byC[a.openCourseId]||[]).push(a);});
  var manual={};matches.filter(function(m){return m.month===month;}).forEach(function(m){manual[m.openCourseId]=1;});
  var ids=Object.keys(byC).filter(function(id){return !manual[id];}).sort(function(a,b){return byC[a].length-byC[b].length;});
  ids.forEach(function(oc){
    var crs=DB.openCourses.find(function(x){return x.id===oc;});var cmp=cmpFactory(DB.config.priorityOrder,crs?crs.region:"");
    var cs=byC[oc].slice().sort(cmp);var w=courseWeeks(oc),win=null;
    for(var k=0;k<cs.length;k++){var nl=tryAdd(load[cs[k].instructorId]||{},w);if(nl){win=cs[k];load[cs[k].instructorId]=nl;break;}}
    if(win)matches.push({id:"M"+rid(),month:month,openCourseId:oc,instructorId:win.instructorId,method:"자동",차수:"1차",reason:byC[oc].length===1?"단독지원":"경합 "+byC[oc].length+"명",at:new Date().toISOString(),confirmed:false});
  });
  var pairs={},mset={};matches.forEach(function(m){pairs[m.openCourseId+"|"+m.instructorId]=1;mset[m.openCourseId]=1;});
  DB.instrApplications=DB.instrApplications.map(function(a){if(a.month!==month)return a;if(pairs[a.openCourseId+"|"+a.instructorId])return Object.assign({},a,{상태:"매칭"});if(mset[a.openCourseId])return Object.assign({},a,{상태:"탈락"});return Object.assign({},a,{상태:"접수"});});

}
/* 2차(우선순위) 재매칭: 미매칭 교육 → 지원자 우선, 없으면 자격 강사로 확장 */
function reMatch(month){
  var matched={};DB.matches.forEach(function(m){matched[m.openCourseId]=1;});
  var unC=DB.openCourses.filter(function(o){return !matched[o.id];});
  if(!unC.length)return {n:0,emails:0};
  var load=buildLoad(month);
  var appliedIds={};DB.instrApplications.filter(function(a){return a.month===month;}).forEach(function(a){appliedIds[a.instructorId]=1;});
  var matchedInstr={};DB.matches.filter(function(m){return m.month===month;}).forEach(function(m){matchedInstr[m.instructorId]=1;});
  var newM=[],emails=[];
  unC.forEach(function(o){
    var cmp=cmpFactory(DB.config.priorityOrder,o.region);
    var apps=DB.instrApplications.filter(function(a){return a.openCourseId===o.id&&a.month===month;});
    var pool;
    if(apps.length)pool=apps.map(function(a){return {id:a.instructorId,instructorId:a.instructorId,우선순위:a.우선순위,신청시각:a.신청시각,ins:DB.instructors.find(function(i){return i.id===a.instructorId;})};});
    else pool=DB.instructors.filter(function(i){return i.modules.indexOf(o.module_no)>=0;}).map(function(i){return {id:i.id,instructorId:i.id,우선순위:3,신청시각:new Date().toISOString(),ins:i};});
    pool=pool.filter(function(p){return p.ins;});
    pool.sort(function(a,b){
      var um=(appliedIds[b.id]&&!matchedInstr[b.id]?1:0)-(appliedIds[a.id]&&!matchedInstr[a.id]?1:0);if(um)return um;
      return cmp(a,b);
    });
    for(var k=0;k<pool.length;k++){var nl=tryAdd(load[pool[k].id]||{},courseWeeks(o.id));if(nl){load[pool[k].id]=nl;matchedInstr[pool[k].id]=1;
      var same=pool[k].ins.region===o.region;
      newM.push({id:"M"+rid(),month:month,openCourseId:o.id,instructorId:pool[k].id,method:"재매칭",차수:"2차",reason:(same?"동일지역":"인접지역")+" 우선순위 재매칭",at:new Date().toISOString(),confirmed:true});
      emails.push(buildAssignEmail(pool[k].ins,o));break;}}
  });
  if(!newM.length)return {n:0,emails:0};
  DB.matches=DB.matches.concat(newM);
  var ids={};newM.forEach(function(m){ids[m.openCourseId]=m.instructorId;});
  DB.openCourses=DB.openCourses.map(function(o){return ids[o.id]?Object.assign({},o,{모집상태:"매칭완료"}):o;});
  DB.sessions=DB.sessions.map(function(s){return ids[s.openCourseId]?Object.assign({},s,{배정강사_id:ids[s.openCourseId]}):s;});
  DB.sentEmails=emails.concat(DB.sentEmails||[]);
  return {n:newM.length,emails:emails.length};
}

}

function showErr(err){try{var b=document.getElementById("errbar");if(b){b.style.display="block";b.textContent="⚠ 스크립트 오류: "+(err&&err.message?err.message:err);}}catch(e){}if(typeof console!=="undefined")console.error(err);}
function runAct(el,e){try{var fn=ACT[el.getAttribute("data-act")];if(fn)fn(el,e);}catch(err){showErr(err);}}
/* 직접 바인딩(최대 호환): 모든 [data-act] 요소에 onclick/onchange/oninput 직접 부여 */
function bind(root){
  if(!root||!root.querySelectorAll)return;
  var els=root.querySelectorAll("[data-act]");
  for(var i=0;i<els.length;i++){(function(el){
    if(el.__bound)return;el.__bound=true;
    var tag=el.tagName,ty=el.type;
    if(tag==="SELECT"||ty==="checkbox"||ty==="radio"||ty==="file"){el.onchange=function(e){runAct(el,e);};}
    else if(tag==="INPUT"||tag==="TEXTAREA"){el.oninput=function(e){runAct(el,e);};}
    else{el.onclick=function(e){runAct(el,e);};}
  })(els[i]);}
}
/* 위임 폴백(closest 미지원/누락 대비, 부모 직접 탐색) */
function delegated(e){try{var t=e.target;while(t&&t.getAttribute){if(t.getAttribute("data-act")!=null){if(!t.__bound)runAct(t,e);return;}t=t.parentNode;}}catch(err){}}
if(document.addEventListener){document.addEventListener("click",delegated,false);document.addEventListener("change",delegated,false);document.addEventListener("input",delegated,false);}
if(typeof window!=="undefined")window.onerror=function(m){showErr(m);return false;};

    if(!DB.admins)DB.admins=[];
    render();
    /* 이후 추가되는 모든 [data-act] 요소 자동 바인딩 */
    try{ if(window.MutationObserver){ var mo=new MutationObserver(function(){ bind(document.body); }); mo.observe(document.body,{childList:true,subtree:true}); } }catch(e){}
    var ok=document.getElementById("jsok"); if(ok){ ok.textContent="● 작동 중"; ok.style.background="#16a34a"; }
  }catch(err){ showErr(err); }
})();
